<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex Bail Bonds | Client Portal Login</title>
  <meta name="description"
    content="Access the secure Apex client portal. Check payment logs, track court dates, and securely update co-signer accounts.">
  <meta name="keywords" content="client portal login, secure bail account, payment plan tracking">
  <meta name="author" content="Apex Bail Bonds">

  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">

  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark.css">
  <link rel="stylesheet" href="assets/css/animations.css">

  <!-- Inline Head Script to prevent Light/Dark flash and RTL shift -->
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
      const savedDir = localStorage.getItem('dir') || 'ltr';
      document.documentElement.setAttribute('dir', savedDir);
    })();
  </script>
</head>

<body>

  <!-- Main Content -->
  <main
    style="position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: var(--bg-color);">
    
    <!-- Top Right Actions (Theme & RTL Toggles) -->
    <div class="auth-actions">
      <button class="rtl-toggle-btn" aria-label="Toggle RTL layout">RTL</button>
      <button class="theme-toggle-btn" aria-label="Toggle dark mode"></button>
    </div>

    <div class="custom-container auth-container" style="padding: 40px 0; max-width: 480px; width: 100%;">
      <div class="glass-card auth-card reveal-on-scroll" style="width: 100%;">

        <div class="mb-4">
          <!-- Brand Logo inside the box (Center Aligned) -->
          <a href="index.html" class="logo mb-4 justify-content-center"
            style="display: flex; justify-content: center; align-items: center; color: var(--text-primary); text-decoration: none;">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              style="width: 32px; height: 32px; stroke: var(--accent); stroke-width: 2.5; flex-shrink: 0;">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
            <span>Apex Bail Bonds</span>
          </a>

          <!-- Main Heading & Sub Heading (Center Aligned) -->
          <h2
            style="font-family: var(--font-headings); font-weight: 700; margin-top: 1rem; margin-bottom: 0.5rem; text-align: center;">
            Secure Client Portal</h2>
          <p style="font-size: 0.9rem; text-align: center; margin-bottom: 0;">Sign in to view payment schedules or check
            court date logs.</p>
        </div>

        <form class="interactive-form">
          <div class="form-group">
            <label class="form-label" for="loginEmail">Email Address</label>
            <input type="email" class="form-control" id="loginEmail" placeholder="name@domain.com" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="loginPassword">Password</label>
            <div class="password-toggle-wrapper">
              <input type="password" class="form-control" id="loginPassword" required>
              <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
                <i data-lucide="eye"></i>
              </button>
            </div>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-4" style="font-size: 0.85rem;">
            <div class="form-check mb-0" style="color: var(--text-secondary);">
              <input class="form-check-input" type="checkbox" id="rememberMe">
              <label class="form-check-label" for="rememberMe" style="margin-bottom: 0;">
                Remember me
              </label>
            </div>
            <a href="404.html" style="font-weight: 500;">Forgot Password?</a>
          </div>

          <button type="submit" class="btn btn-primary mb-3 w-100">
            <i data-lucide="log-in"></i>
            Authenticate Account
          </button>

          <!-- Divider -->
          <div class="d-flex align-items-center my-3">
            <hr class="flex-grow-1" style="border-color: var(--border-color); opacity: 0.5; margin: 0;">
            <span class="px-2" style="font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 500; letter-spacing: 0.5px;">Or continue with</span>
            <hr class="flex-grow-1" style="border-color: var(--border-color); opacity: 0.5; margin: 0;">
          </div>

          <!-- Social Login Options -->
          <div class="d-flex justify-content-center gap-3 mb-4">
            <button type="button" class="btn btn-secondary d-flex align-items-center justify-content-center" style="width: 46px; height: 46px; padding: 0; border-radius: 50%;" title="Sign in with Google">
              <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4" />
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" />
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05" />
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335" />
              </svg>
            </button>
            <button type="button" class="btn btn-secondary d-flex align-items-center justify-content-center" style="width: 46px; height: 46px; padding: 0; border-radius: 50%;" title="Sign in with Apple">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.21.67-2.93 1.49-.62.69-1.16 1.84-1.01 2.96 1.12.09 2.27-.58 2.95-1.39z"/>
              </svg>
            </button>
          </div>

          <div class="text-center" style="display: block; width: 100%; text-align: center; font-size: 0.9rem; color: var(--text-secondary);">
            Don't have a cosigner portal profile? <a href="signup.html" style="font-weight: 600;">Create Profile</a>
          </div>
        </form>

      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <script src="assets/js/theme-toggle.js"></script>
  <script src="assets/js/animations.js"></script>
  <script src="assets/js/main.js"></script>
</body>

</html>
